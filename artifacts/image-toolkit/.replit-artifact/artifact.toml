kind = "web"
previewPath = "/"
title = "Image Toolkit"
version = "1.0.0"
id = "artifacts/image-toolkit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21388

[services.development]
run = "pnpm --filter @workspace/image-toolkit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/image-toolkit", "run", "build" ]
publicDir = "artifacts/image-toolkit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21388"
BASE_PATH = "/"
